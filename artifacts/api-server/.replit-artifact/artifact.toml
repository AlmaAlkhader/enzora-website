kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# Apply pending DB changes before starting the server so new tables/columns
# are available on every deploy. Order is important and is enforced here:
#   1. Run our raw-SQL migrator first (MIGRATE_ONLY=1 makes the bundled
#      server entry exit after `runMigrations()`). The hand-written
#      migrations safely handle renames and other destructive changes.
#   2. Run `drizzle-kit push --force` against the already-migrated DB to
#      pick up additive Drizzle schema changes (new tables/columns) that
#      don't have a hand-written migration yet. `tablesFilter` in
#      drizzle.config.ts excludes the migrator's bookkeeping table.
#   3. Exec the server normally.
args = [
  "bash",
  "-c",
  "MIGRATE_ONLY=1 node --enable-source-maps artifacts/api-server/dist/index.mjs && pnpm --filter @workspace/db run push-force && exec node --enable-source-maps artifacts/api-server/dist/index.mjs",
]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
