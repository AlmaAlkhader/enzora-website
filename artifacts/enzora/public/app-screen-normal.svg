<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 1122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <rect width="540" height="1122" fill="#EEF0FB"/>

  <!-- Header -->
  <text x="40" y="90" font-size="26" fill="#6B6F8E">Hello,</text>
  <text x="40" y="160" font-size="64" font-weight="800" fill="#14163A">Alma</text>

  <!-- Monitoring pill -->
  <rect x="40" y="200" width="460" height="68" rx="16" fill="#DDE0F2"/>
  <circle cx="78" cy="234" r="8" fill="none" stroke="#5E57C8" stroke-width="2.5"/>
  <circle cx="68" cy="234" r="6" fill="none" stroke="#5E57C8" stroke-width="2.5"/>
  <text x="100" y="244" font-size="24" fill="#5E57C8">Monitoring: <tspan font-weight="700" fill="#1A1F4E">Alma</tspan></text>

  <!-- Device connected badge -->
  <rect x="160" y="298" width="220" height="52" rx="26" fill="#DCFCE7"/>
  <circle cx="190" cy="324" r="7" fill="#16A34A"/>
  <text x="208" y="332" font-size="20" font-weight="700" fill="#166534" letter-spacing="1.5">DEVICE CONNECTED</text>

  <!-- Status card -->
  <rect x="40" y="394" width="460" height="430" rx="22" fill="#FFFFFF" stroke="#EBEDF6"/>
  <rect x="40" y="394" width="460" height="10" rx="5" fill="#F5A623"/>

  <!-- Icon circle -->
  <circle cx="100" cy="468" r="38" fill="#FFE9C0"/>
  <path d="M82 468 l14 14 l24 -28" fill="none" stroke="#B8740A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Status badge -->
  <rect x="320" y="442" width="156" height="46" rx="23" fill="#FFE6B0"/>
  <circle cx="340" cy="465" r="5" fill="#B8740A"/>
  <text x="354" y="473" font-size="17" font-weight="800" fill="#B8740A" letter-spacing="1">HEALING WELL</text>

  <!-- Title + body -->
  <text x="74" y="572" font-size="40" font-weight="800" fill="#14163A">Wound is Normal</text>
  <text x="74" y="616" font-size="22" fill="#6B6F8E">Looks good today. Keep it clean and dry.</text>

  <!-- Last check -->
  <circle cx="86" cy="664" r="11" fill="none" stroke="#6B6F8E" stroke-width="2"/>
  <path d="M86 658 v6 l5 4" fill="none" stroke="#6B6F8E" stroke-width="2" stroke-linecap="round"/>
  <text x="106" y="671" font-size="20" fill="#6B6F8E">Last check: just now</text>

  <!-- Button -->
  <rect x="74" y="712" width="392" height="76" rx="38" fill="#6259D6"/>
  <text x="270" y="760" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle">View Details  ›</text>

  <!-- Stat cards row -->
  <g>
    <rect x="40" y="864" width="146" height="180" rx="20" fill="#FFFFFF" stroke="#EBEDF6"/>
    <rect x="64" y="888" width="38" height="38" rx="10" fill="#EEF0FB"/>
    <rect x="69" y="893" width="28" height="28" rx="4" fill="none" stroke="#5E57C8" stroke-width="2"/>
    <line x1="69" y1="901" x2="97" y2="901" stroke="#5E57C8" stroke-width="2"/>
    <text x="113" y="954" font-size="34" font-weight="800" fill="#14163A" text-anchor="middle">1</text>
    <text x="113" y="1018" font-size="16" fill="#6B6F8E" text-anchor="middle">Days Monitored</text>
  </g>
  <g>
    <rect x="197" y="864" width="146" height="180" rx="20" fill="#FFFFFF" stroke="#EBEDF6"/>
    <circle cx="240" cy="908" r="20" fill="#EEF0FB"/>
    <circle cx="240" cy="908" r="13" fill="none" stroke="#5E57C8" stroke-width="2"/>
    <path d="M240 900 v9 l6 4" fill="none" stroke="#5E57C8" stroke-width="2" stroke-linecap="round"/>
    <text x="270" y="966" font-size="26" font-weight="800" fill="#14163A" text-anchor="middle">just now</text>
    <text x="270" y="1018" font-size="16" fill="#6B6F8E" text-anchor="middle">Last check</text>
  </g>
  <g>
    <rect x="354" y="864" width="146" height="180" rx="20" fill="#FFFFFF" stroke="#EBEDF6"/>
    <circle cx="397" cy="908" r="20" fill="#EEF0FB"/>
    <path d="M390 904 a8 8 0 0 1 16 0 v8 l3 4 h-22 l3 -4 z" fill="#5E57C8"/>
    <circle cx="398" cy="920" r="3" fill="#5E57C8"/>
    <text x="427" y="954" font-size="34" font-weight="800" fill="#14163A" text-anchor="middle">0</text>
    <text x="427" y="1018" font-size="16" fill="#6B6F8E" text-anchor="middle">New Alerts</text>
  </g>
</svg>
