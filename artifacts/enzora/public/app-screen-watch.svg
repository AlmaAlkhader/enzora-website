<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 1122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <rect width="540" height="1122" fill="#EEF0FB"/>

  <!-- Header -->
  <text x="40" y="90" font-size="26" fill="#6B6F8E">Hello,</text>
  <text x="40" y="160" font-size="64" font-weight="800" fill="#14163A">Alma</text>

  <!-- Monitoring pill -->
  <rect x="40" y="200" width="460" height="68" rx="16" fill="#DDE0F2"/>
  <circle cx="78" cy="234" r="8" fill="none" stroke="#5E57C8" stroke-width="2.5"/>
  <circle cx="68" cy="234" r="6" fill="none" stroke="#5E57C8" stroke-width="2.5"/>
  <text x="100" y="244" font-size="24" fill="#5E57C8">Monitoring: <tspan font-weight="700" fill="#1A1F4E">Alma</tspan></text>

  <!-- Device connected badge -->
  <rect x="160" y="298" width="220" height="52" rx="26" fill="#DCFCE7"/>
  <circle cx="190" cy="324" r="7" fill="#16A34A"/>
  <text x="208" y="332" font-size="20" font-weight="700" fill="#166534" letter-spacing="1.5">DEVICE CONNECTED</text>

  <!-- Notification banner -->
  <rect x="40" y="386" width="460" height="120" rx="18" fill="#E6F7EC" stroke="#B7E4C7"/>
  <circle cx="80" cy="446" r="14" fill="#16A34A"/>
  <text x="116" y="436" font-size="22" font-weight="600" fill="#14163A">Small color change detected.</text>
  <text x="116" y="468" font-size="22" fill="#14163A">Watch your wound today.</text>
  <text x="468" y="416" font-size="22" fill="#9CA3AF" text-anchor="middle">×</text>

  <!-- Status card -->
  <rect x="40" y="528" width="460" height="430" rx="22" fill="#FFFFFF" stroke="#EBEDF6"/>
  <rect x="40" y="528" width="460" height="10" rx="5" fill="#16A34A"/>

  <!-- Eye icon circle -->
  <circle cx="100" cy="602" r="38" fill="#DCFCE7"/>
  <path d="M70 602 q30 -28 60 0 q-30 28 -60 0 z" fill="none" stroke="#16A34A" stroke-width="3.5"/>
  <circle cx="100" cy="602" r="9" fill="#16A34A"/>

  <!-- Title + body -->
  <text x="74" y="710" font-size="40" font-weight="800" fill="#14163A">Watch Closely</text>
  <text x="74" y="754" font-size="22" fill="#6B6F8E">A small change was noticed.</text>
  <text x="74" y="784" font-size="22" fill="#6B6F8E">Keep an eye on it.</text>

  <!-- Last check -->
  <circle cx="86" cy="828" r="11" fill="none" stroke="#6B6F8E" stroke-width="2"/>
  <path d="M86 822 v6 l5 4" fill="none" stroke="#6B6F8E" stroke-width="2" stroke-linecap="round"/>
  <text x="106" y="835" font-size="20" fill="#6B6F8E">Last check: just now</text>

  <!-- Button -->
  <rect x="74" y="876" width="392" height="76" rx="38" fill="#6259D6"/>
  <text x="270" y="924" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle">View Details  ›</text>

  <!-- Stat cards row -->
  <g>
    <rect x="40" y="998" width="146" height="100" rx="20" fill="#FFFFFF" stroke="#EBEDF6"/>
    <rect x="64" y="1022" width="38" height="38" rx="10" fill="#EEF0FB"/>
    <rect x="69" y="1027" width="28" height="28" rx="4" fill="none" stroke="#5E57C8" stroke-width="2"/>
    <line x1="69" y1="1035" x2="97" y2="1035" stroke="#5E57C8" stroke-width="2"/>
  </g>
  <g>
    <rect x="197" y="998" width="146" height="100" rx="20" fill="#FFFFFF" stroke="#EBEDF6"/>
    <circle cx="270" cy="1042" r="20" fill="#EEF0FB"/>
    <circle cx="270" cy="1042" r="13" fill="none" stroke="#5E57C8" stroke-width="2"/>
    <path d="M270 1034 v9 l6 4" fill="none" stroke="#5E57C8" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g>
    <rect x="354" y="998" width="146" height="100" rx="20" fill="#FFFFFF" stroke="#EBEDF6"/>
    <circle cx="427" cy="1042" r="20" fill="#FFE9C0"/>
    <path d="M420 1038 a8 8 0 0 1 16 0 v8 l3 4 h-22 l3 -4 z" fill="#B8740A"/>
    <circle cx="428" cy="1054" r="3" fill="#B8740A"/>
  </g>
</svg>
