<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 1122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <rect width="540" height="1122" fill="#EEF0FB"/>

  <!-- Header -->
  <text x="40" y="90" font-size="26" fill="#6B6F8E">Hello,</text>
  <text x="40" y="160" font-size="64" font-weight="800" fill="#14163A">Alma</text>

  <!-- Monitoring pill -->
  <rect x="40" y="200" width="460" height="68" rx="16" fill="#DDE0F2"/>
  <circle cx="78" cy="234" r="8" fill="none" stroke="#5E57C8" stroke-width="2.5"/>
  <circle cx="68" cy="234" r="6" fill="none" stroke="#5E57C8" stroke-width="2.5"/>
  <text x="100" y="244" font-size="24" fill="#5E57C8">Monitoring: <tspan font-weight="700" fill="#1A1F4E">Alma</tspan></text>

  <!-- Device connected badge -->
  <rect x="160" y="298" width="220" height="52" rx="26" fill="#DCFCE7"/>
  <circle cx="190" cy="324" r="7" fill="#16A34A"/>
  <text x="208" y="332" font-size="20" font-weight="700" fill="#166534" letter-spacing="1.5">DEVICE CONNECTED</text>

  <!-- Notification banner (blue) -->
  <rect x="40" y="386" width="460" height="120" rx="18" fill="#DBEAFE" stroke="#BFDBFE"/>
  <circle cx="80" cy="446" r="14" fill="#2563EB"/>
  <circle cx="76" cy="442" r="4" fill="#FFFFFF" opacity="0.7"/>
  <text x="116" y="436" font-size="22" font-weight="600" fill="#14163A">Alert reading detected.</text>
  <text x="116" y="468" font-size="22" fill="#14163A">Call your doctor today.</text>
  <text x="468" y="416" font-size="22" fill="#9CA3AF" text-anchor="middle">×</text>

  <!-- Status card (red bg) -->
  <rect x="40" y="528" width="460" height="490" rx="22" fill="#FEE2E2"/>
  <rect x="40" y="528" width="460" height="10" rx="5" fill="#DC2626"/>

  <!-- Octagon alert icon -->
  <circle cx="100" cy="602" r="38" fill="#FFFFFF"/>
  <polygon points="100,576 116,584 124,600 116,616 100,624 84,616 76,600 84,584" fill="none" stroke="#DC2626" stroke-width="4" stroke-linejoin="round"/>
  <line x1="100" y1="588" x2="100" y2="606" stroke="#DC2626" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="615" r="2.5" fill="#DC2626"/>

  <!-- Title + body -->
  <text x="74" y="710" font-size="40" font-weight="800" fill="#DC2626">Infection Alert</text>
  <text x="74" y="754" font-size="22" fill="#14163A">Call your doctor today.</text>

  <!-- Last check -->
  <circle cx="86" cy="800" r="11" fill="none" stroke="#DC2626" stroke-width="2"/>
  <path d="M86 794 v6 l5 4" fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round"/>
  <text x="106" y="807" font-size="20" fill="#DC2626">Last check: just now</text>

  <!-- Call Doctor button (red) -->
  <rect x="74" y="848" width="392" height="76" rx="38" fill="#DC2626"/>
  <g transform="translate(150 873)">
    <path d="M0 4 a4 4 0 0 1 4 -4 h6 a4 4 0 0 1 4 3 l1 6 a4 4 0 0 1 -2 4 l-3 2 a18 18 0 0 0 9 9 l2 -3 a4 4 0 0 1 4 -2 l6 1 a4 4 0 0 1 3 4 v6 a4 4 0 0 1 -4 4 a30 30 0 0 1 -30 -30 z" fill="#FFFFFF"/>
  </g>
  <text x="290" y="896" font-size="26" font-weight="800" fill="#FFFFFF" text-anchor="middle">Call Doctor Now</text>

  <!-- View details button (white) -->
  <rect x="74" y="942" width="392" height="62" rx="31" fill="#FFFFFF"/>
  <text x="270" y="983" font-size="22" font-weight="700" fill="#DC2626" text-anchor="middle">View Details  ›</text>
</svg>
