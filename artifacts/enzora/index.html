<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Enzora — Smart wound monitoring bandage & device</title>
    <meta name="description" content="Enzora combines a color-guided wound bandage with an optional smart sensor device for clearer home wound-care monitoring." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Enzora — Smart wound monitoring" />
    <meta property="og:description" content="Color-guided bandage and connected device supporting smarter home wound monitoring." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Enzora — Smart wound monitoring" />
    <meta name="twitter:description" content="Color-guided bandage and connected device supporting smarter home wound monitoring." />
    <link rel="icon" type="image/png" href="./enzora-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (function () {
        function readCookie(name) {
          try {
            var parts = (document.cookie || "").split("; ");
            for (var i = 0; i < parts.length; i++) {
              var idx = parts[i].indexOf("=");
              if (idx === -1) continue;
              if (decodeURIComponent(parts[i].slice(0, idx)) === name) {
                return decodeURIComponent(parts[i].slice(idx + 1));
              }
            }
          } catch (e) {}
          return null;
        }
        var lang = null;
        try {
          lang = localStorage.getItem("enzora-lang");
        } catch (e) {}
        if (lang !== "ar" && lang !== "en") {
          var cookieLang = readCookie("lang");
          if (cookieLang === "ar" || cookieLang === "en") {
            lang = cookieLang;
          }
        }
        if (lang !== "ar" && lang !== "en") lang = "en";
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
